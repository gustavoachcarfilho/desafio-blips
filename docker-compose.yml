services:
  mongodb:
    image: mongo:latest
    container_name: mongodb_leads
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    volumes:
      - mongo_data:/data/db

  api:
    build: .
    container_name: fastapi_leads_app
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
    env_file:
      - .env
    environment:
      - MONGODB_URL=mongodb://admin:admin@mongodb:27017/

volumes:
  mongo_data: